<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phantom Dome WebGL</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  body, html { margin: 0; padding: 0; background: #050505; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
  #webgl-canvas { display: block; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 50; cursor: grab; }
  #webgl-canvas:active { cursor: grabbing; }
  .main-nav { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; gap: 6px; background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); padding: 6px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.1); }
  .main-nav a { padding: 10px 24px; font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; color: #fff; text-decoration: none; border-radius: 30px; font-weight: 500; transition: all 0.3s; }
  .main-nav a.active { background: #fff; color: #000; }
  .main-nav a:hover:not(.active) { background: rgba(255,255,255,0.1); }
  #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; font-family: 'Syne', sans-serif; font-size: 1.5rem; color: #fff; text-transform: uppercase; letter-spacing: 0.2em; pointer-events: none; transition: opacity 0.5s; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
<nav class="main-nav">
  <a href="/">Home</a>
  <a href="#" class="active">Showcase</a>
</nav>

<div id="loading">Initializing Chamber...</div>
<canvas id="webgl-canvas"></canvas>

<script>
document.fonts.ready.then(initWebGL);

function initWebGL() {
  const canvas = document.getElementById('webgl-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x050505, 0.0001); 

  const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 1, 20000);
  camera.position.z = 0; 

  const vertexShader = `
    varying vec2 vUv;
    uniform float uRadius;

    void main() {
      vUv = uv;
      vec4 pos = modelMatrix * vec4(position, 1.0);
      
      // Pure Cylinder Math
      float theta = pos.x / uRadius; 
      
      float newX = sin(theta) * uRadius;
      float newZ = -cos(theta) * uRadius; 
      
      pos.x = newX;
      // pos.y stays unchanged (straight cylinder wall)
      pos.z = newZ;
      
      gl_Position = projectionMatrix * viewMatrix * pos;
    }
  `;

  const fragmentShader = `
    varying vec2 vUv;
    uniform sampler2D uTexture;
    
    void main() {
      vec4 texColor = texture2D(uTexture, vUv);
      vec3 finalColor = texColor.rgb * 0.95; 
      gl_FragColor = vec4(finalColor, texColor.a);
    }
  `;

  const PADDING = 45;

  function createCardTexture(w, h, imgUrl, niche, brand) {
    const cvs = document.createElement('canvas');
    cvs.width = w * 2; cvs.height = h * 2; 
    const ctx = cvs.getContext('2d');
    ctx.scale(2, 2);
    
    ctx.clearRect(0, 0, w, h);
    
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(w - 0.5, 0);
    ctx.lineTo(w - 0.5, h - 0.5);
    ctx.lineTo(0, h - 0.5);
    ctx.stroke();

    if(imgUrl) {
      const imgW = w - (PADDING * 2);
      const imgH = h - (PADDING * 2) - 35;
      const imgX = PADDING;
      const imgY = PADDING + 15;

      ctx.fillStyle = '#777';
      ctx.font = '500 9px "Inter", monospace';
      ctx.textBaseline = 'top';
      ctx.fillText('EXPERIENCE / 3D', PADDING, PADDING - 10);
      ctx.textAlign = 'right';
      ctx.fillText('2026', w - PADDING, PADDING - 10);
      
      ctx.fillStyle = '#888';
      ctx.font = '600 10px "Inter", sans-serif';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'bottom';
      ctx.fillText(brand.toUpperCase(), PADDING, h - PADDING - 15);
      
      ctx.fillStyle = '#eee';
      ctx.font = '600 16px "Syne", sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText(niche, w - PADDING, h - PADDING - 15);
    }
    
    const tex = new THREE.CanvasTexture(cvs);
    tex.minFilter = THREE.LinearFilter;
    tex.magFilter = THREE.LinearFilter;
    
    if(imgUrl && w > PADDING*2 && h > PADDING*2 + 35) {
      const img = new Image();
      img.crossOrigin = 'Anonymous';
      img.src = imgUrl;
      img.onload = () => {
        const imgW = w - (PADDING * 2);
        const imgH = h - (PADDING * 2) - 35;
        const imgX = PADDING;
        const imgY = PADDING + 15;
        
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(imgX + 6, imgY);
        ctx.lineTo(imgX + imgW - 6, imgY);
        ctx.quadraticCurveTo(imgX + imgW, imgY, imgX + imgW, imgY + 6);
        ctx.lineTo(imgX + imgW, imgY + imgH - 6);
        ctx.quadraticCurveTo(imgX + imgW, imgY + imgH, imgX + imgW - 6, imgY + imgH);
        ctx.lineTo(imgX + 6, imgY + imgH);
        ctx.quadraticCurveTo(imgX, imgY + imgH, imgX, imgY + imgH - 6);
        ctx.lineTo(imgX, imgY + 6);
        ctx.quadraticCurveTo(imgX, imgY, imgX + 6, imgY);
        ctx.closePath();
        ctx.clip();
        
        const aspect = img.width / img.height;
        const targetAspect = imgW / imgH;
        let sx = 0, sy = 0, sw = img.width, sh = img.height;
        
        if (aspect > targetAspect) {
           sw = img.height * targetAspect;
           sx = (img.width - sw) / 2;
        } else {
           sh = img.width / targetAspect;
           sy = (img.height - sh) / 2;
        }
        
        ctx.drawImage(img, sx, sy, sw, sh, imgX, imgY, imgW, imgH);
        ctx.restore();
        
        tex.needsUpdate = true;
      };
    }
    return tex;
  }

  const niches = ["Visitor Experience Guide", "AI Compass", "Next Stop Happily Ever", "Global Tech Review", "Beauty Vlogger VR", "Streetwear Campaign"];
  const brands = ["Google", "Nike", "Phantom", "Balenciaga", "Sony", "Apple"];
  
  const imagesPool = [];
  for(let i=0; i<15; i++) {
     imagesPool.push(`https://picsum.photos/seed/${i+400}/800/800`);
  }

  const textureCache = {};
  function getCachedTexture(w, h, isEmpty, idx) {
      if(isEmpty) {
          const key = `empty_${Math.floor(w)}_${Math.floor(h)}`;
          if(!textureCache[key]) textureCache[key] = createCardTexture(w, h, null, "", "");
          return textureCache[key];
      } else {
          const imgIdx = idx % imagesPool.length;
          const key = `img_${Math.floor(w)}_${Math.floor(h)}_${imgIdx}`;
          if(!textureCache[key]) {
              const imgUrl = imagesPool[imgIdx];
              const niche = niches[idx % niches.length];
              const brand = brands[idx % brands.length];
              textureCache[key] = createCardTexture(w, h, imgUrl, niche, brand);
          }
          return textureCache[key];
      }
  }

  const domeGroup = new THREE.Group();
  scene.add(domeGroup);

  const BASE_SCALE = 3.5; 

  const colBaseWidths = [450, 550, 350, 600, 450, 500, 400, 550, 350, 450, 600, 400];
  const colWidths = [];
  for(let i=0; i<3; i++) {
      colWidths.push(...colBaseWidths);
  }

  const allowedHeights = [300, 450, 600, 400, 550]; 
  
  const rawTotalWidth = colWidths.reduce((a, b) => a + b, 0); 
  const totalWidth = rawTotalWidth * BASE_SCALE; 
  const radius = totalWidth / (2 * Math.PI); 
  
  let layoutX = 0;
  const cardsData = [];
  
  for(let c = 0; c < colWidths.length; c++) {
      const colW = colWidths[c];
      let layoutY = -10000; // Start deeply low to cover 75+ degrees downwards
      
      for(let r = 0; r < 45; r++) { // 45 cards generates an immensely tall wall
          let cardH = allowedHeights[Math.floor(Math.random() * allowedHeights.length)];
          const isEmpty = Math.random() > 0.6; 
          
          cardsData.push({
             x: layoutX * BASE_SCALE,
             y: layoutY * BASE_SCALE,
             w: colW * BASE_SCALE,
             h: cardH * BASE_SCALE,
             rawW: colW, 
             rawH: cardH,
             empty: isEmpty
          });
          layoutY += cardH;
      }
      layoutX += colW;
  }
  
  cardsData.forEach((card, idx) => {
      const flatX = card.x - (totalWidth / 2) + (card.w / 2);
      const flatY = card.y + (card.h / 2);
      
      const tex = getCachedTexture(card.rawW, card.rawH, card.empty, idx);
      
      const material = new THREE.ShaderMaterial({
        vertexShader,
        fragmentShader,
        uniforms: {
          uTexture: { value: tex },
          uRadius: { value: radius }
        },
        transparent: true,
        side: THREE.DoubleSide
      });
      
      const geometry = new THREE.PlaneGeometry(card.w, card.h, 32, 1); 
      const mesh = new THREE.Mesh(geometry, material);
      
      // CRITICAL FIX: Prevent Three.js from deleting meshes when looking away
      mesh.frustumCulled = false; 

      mesh.position.x = flatX;
      mesh.position.y = flatY;
      mesh.position.z = 0; 
      
      domeGroup.add(mesh);
  });

  document.getElementById('loading').style.opacity = '0';

  let targetX = 0; let targetY = 0;
  let currentX = 0; let currentY = 0;
  let isDrag = false, startX = 0, startY = 0;

  window.addEventListener('mousedown', (e) => { isDrag=true; startX=e.clientX; startY=e.clientY; document.body.style.cursor='grabbing'; });
  window.addEventListener('mousemove', (e) => {
    if(!isDrag) return;
    targetX += (e.clientX - startX) * 0.15; 
    targetY -= (e.clientY - startY) * 0.15; 
    targetY = Math.max(-45, Math.min(45, targetY)); // Clamped far enough for 3D feel, but safely away from the physical edges
    startX = e.clientX; startY = e.clientY;
  });
  window.addEventListener('mouseup', () => { isDrag=false; document.body.style.cursor='default'; });

  window.addEventListener('touchstart', (e) => { isDrag=true; startX=e.touches[0].clientX; startY=e.touches[0].clientY; });
  window.addEventListener('touchmove', (e) => {
    if(!isDrag) return;
    targetX += (e.touches[0].clientX - startX) * 0.25;
    targetY -= (e.touches[0].clientY - startY) * 0.25;
    targetY = Math.max(-45, Math.min(45, targetY)); // Clamp at 45 degrees
    startX = e.touches[0].clientX; startY = e.touches[0].clientY;
  });
  window.addEventListener('touchend', () => { isDrag=false; });

  function animate() {
    requestAnimationFrame(animate);
    
    if(!isDrag) { targetX += 0.05; targetY += (0 - targetY)*0.02; /* Auto center Y */ }
    currentX += (targetX - currentX) * 0.08;
    currentY += (targetY - currentY) * 0.08;
    
    camera.rotation.y = THREE.MathUtils.degToRad(-currentX);
    camera.rotation.x = THREE.MathUtils.degToRad(currentY); // Restored 3D POV look
    camera.rotation.order = "YXZ";
    camera.position.y = 0;
    
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
}
</script>
</body>
</html>
